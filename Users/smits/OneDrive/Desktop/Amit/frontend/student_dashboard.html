<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexLib | My Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="app-layout">
    <nav class="sidebar glass" id="sidebar-container"></nav>
    <main class="content">
        <header class="page-header">
            <div class="page-title">
                <h1>My Portal</h1>
                <p>Welcome back! You have 10,000+ titles waiting for you.</p>
            </div>
            <div class="user-profile" id="header-profile" style="display: flex; align-items: center; gap: 15px;"></div>
        </header>
        <section class="stats-container" id="student-summary">
            <div class="stat-card glass loading-pulse" style="height: 120px;"></div>
            <div class="stat-card glass loading-pulse" style="height: 120px;"></div>
        </section>
        <section class="glass table-card">
            <h3>My Reading History</h3>
            <div class="table-container">
                <table>
                    <thead><tr><th>Book Title</th><th>Issue Date</th><th>Due Date</th><th>Status</th><th>Fine</th></tr></thead>
                    <tbody id="history-list"></tbody>
                </table>
            </div>
        </section>
    </main>
    <div id="toast-container"></div>
    <script src="app.js"></script>
    <script>checkAuth('student');</script>
</body>
</html>
