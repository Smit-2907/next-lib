<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexLib | Register Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-container">
    <div class="auth-card glass">
        <header class="auth-header">
            <h1>Create Account</h1>
            <p>Join our premium library community</p>
        </header>
        <form id="register-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" class="form-control" id="reg-name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" class="form-control" id="reg-email" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" class="form-control" id="reg-password" required placeholder="Min. 6 characters">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="reg-role" class="form-control">
                    <option value="student">Student</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-full mt-4" style="width: 100%;">Get Started</button>
        </form>
        <p class="mt-4 text-center" style="font-size: 0.9rem; color: var(--text-muted);">
            Already have an account? <a href="login.html" style="color: var(--primary); text-decoration: none;">Login here</a>
        </p>
    </div>
    <div id="toast-container"></div>
    <script src="app.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-password').value,
                role: document.getElementById('reg-role').value
            };
            
            try {
                const res = await fetch('http://127.0.0.1:8000/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                if (res.ok) {
                    showToast('Account created! Logging you in...', 'success');
                    // Automatically log in
                    const loginRes = await fetch('http://127.0.0.1:8000/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: payload.email, password: payload.password })
                    });

                    const loginData = await loginRes.json();
                    if (loginRes.ok) {
                        sessionStorage.setItem('token', loginData.access_token);
                        sessionStorage.setItem('role', loginData.role);
                        setTimeout(() => {
                           window.location.href = loginData.role === 'admin' ? 'admin_dashboard.html' : 'student_dashboard.html';
                        }, 1000);
                    }
                } else {
                    showToast(data.detail || 'Registration failed', 'danger');
                }
            } catch (err) {
                showToast('API unreachable.', 'danger');
            }
        });
    </script>
</body>
</html>
